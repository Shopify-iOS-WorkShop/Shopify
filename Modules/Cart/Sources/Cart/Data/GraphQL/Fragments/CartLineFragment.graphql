fragment CartLineFragment on BaseCartLine {
  id
  quantity
  merchandise {
    ... on ProductVariant {
      id
      title
      availableForSale
      quantityAvailable
      price { ...MoneyFragment }
      compareAtPrice { ...MoneyFragment }
      image {
        url
        altText
        width
        height
      }
      selectedOptions { name value }
      product {
        id
        title
        handle
        vendor
        featuredImage { url altText }
      }
    }
  }
  cost {
    amountPerQuantity { ...MoneyFragment }
    compareAtAmountPerQuantity { ...MoneyFragment }
    subtotalAmount { ...MoneyFragment }
    totalAmount { ...MoneyFragment }
  }
  discountAllocations {
    discountedAmount { ...MoneyFragment }
  }
}
