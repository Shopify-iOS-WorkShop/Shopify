fragment CartFragment on Cart {
  id
  checkoutUrl
  totalQuantity
  note
  lines(first: 250) {
    nodes {
      ...CartLineFragment
    }
  }
  cost {
    subtotalAmount { ...MoneyFragment }
    totalAmount { ...MoneyFragment }
    checkoutChargeAmount { ...MoneyFragment }
  }
  discountCodes {
    code
    applicable
  }
  buyerIdentity {
    email
    phone
    customer { id }
  }
}
